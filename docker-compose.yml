#version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_uploaddata
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini  # TAMBAHKAN INI
    env_file:
      - .env
    expose:
      - "9000"
    networks:
      - laravel_uploaddata

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uploaddata_queque
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "mkdir -p /var/log/supervisor &&
             cp /var/www/docker/supervisor/laravel-worker.conf /etc/supervisor/conf.d/ &&
             supervisord -n -c /etc/supervisor/supervisord.conf"
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini  # TAMBAHKAN INI JUGA
    depends_on:
      - app
    networks:
      - laravel_uploaddata

  nginx:
    image: nginx:alpine
    container_name: uploaddata_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
      - "10443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - laravel_uploaddata

networks:
  laravel_uploaddata:
    driver: bridge